<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>代码记录本</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism.min.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div>
        <h1>代码记录本</h1>
        <p class="subtitle">按语言分类管理代码，支持标题/说明搜索、分页、按需加载代码内容</p>
      </div>
    </header>

    <section class="toolbar">
      <input id="searchInput" type="text" placeholder="搜索标题或说明…" />
      <div id="categoryBar" class="category-bar"></div>
    </section>

    <section class="status-bar">
      <span id="resultInfo">正在加载…</span>
    </section>

    <main>
      <div id="cardList" class="card-list"></div>
      <div id="emptyState" class="empty-state hidden">没有匹配结果。</div>
    </main>

    <footer class="pagination">
      <button id="prevBtn" type="button">上一页</button>
      <span id="pageInfo">第 1 / 1 页</span>
      <button id="nextBtn" type="button">下一页</button>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-python.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-javascript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-json.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-markdown.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-css.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-markup.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-clike.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-basic.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
