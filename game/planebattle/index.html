<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>星际战机 | 自动射击·道具升级</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: none; /* 优化触控，禁止滚动 */
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #020617, #000000);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', 'Courier New', monospace;
            overflow: hidden;
            touch-action: none;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 12px;
            border-radius: 40px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(3px);
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 28px;
            box-shadow: 0 0 0 3px rgba(0, 255, 255, 0.2), 0 20px 35px rgba(0, 0, 0, 0.6);
            cursor: none;
            touch-action: none;
        }

        .info-panel {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            gap: 20px;
            background: rgba(5, 15, 30, 0.8);
            backdrop-filter: blur(12px);
            padding: 10px 24px;
            border-radius: 60px;
            border: 1px solid rgba(0, 200, 255, 0.5);
        }

        .score-box, .best-box {
            font-weight: bold;
            text-shadow: 0 0 6px cyan;
        }

        .score-box span, .best-box span {
            font-size: 0.9rem;
            color: #bbffff;
            letter-spacing: 1px;
        }

        .score-value, .best-value {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FFE6B0, #FFB347);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-left: 8px;
        }

        .restart-btn {
            background: #ff5e1a;
            border: none;
            font-family: inherit;
            font-weight: bold;
            font-size: 1rem;
            padding: 6px 20px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 0 6px orange;
        }

        .restart-btn:active {
            transform: scale(0.96);
        }

        .buff-status {
            font-size: 0.7rem;
            background: rgba(0, 0, 0, 0.6);
            padding: 4px 14px;
            border-radius: 26px;
            color: #aaffdd;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .controls-tip {
            font-size: 0.7rem;
            color: #7ab3c8;
            background: rgba(0,0,0,0.45);
            padding: 6px 20px;
            border-radius: 28px;
            margin-top: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
<div>
    <div class="game-container">
        <canvas id="gameCanvas" width="900" height="650"></canvas>
        <div class="info-panel">
            <div class="score-box">
                <span>✨ 积分</span>
                <span class="score-value" id="scoreDisplay">0</span>
            </div>
            <div class="best-box">
                <span>🏆 最高</span>
                <span class="best-value" id="bestDisplay">0</span>
            </div>
            <button class="restart-btn" id="restartButton">✈ 重生</button>
        </div>
        <div class="buff-status" id="buffStatusText">⚡ 常规模式</div>
        <div class="controls-tip">
            👆 手指滑动 → 控制战机 &nbsp;&nbsp;|&nbsp;&nbsp; 💥 自动连射 &nbsp;&nbsp;|&nbsp;&nbsp; 🎁 击落敌机掉道具
        </div>
    </div>
</div>

<script>
    (function(){
        // ---------- CANVAS 元素 ----------
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const W = 900, H = 650;
        canvas.width = W;
        canvas.height = H;

        // ---------- 游戏状态 ----------
        let gameState = "playing";   // playing, gameover
        
        // 玩家属性
        const BASE_PLAYER_RADIUS = 16;
        let player = { x: W/2, y: H - 65, radius: BASE_PLAYER_RADIUS };
        
        // 动态实体
        let bullets = [];       // 子弹 {x, y, radius, speedY}
        let enemies = [];       // 敌机
        let powerups = [];      // 道具 {x, y, radius, type, speedY}
        
        // 星星背景
        let stars = [];
        
        // 得分 & 最高分
        let currentScore = 0;
        let highScore = 0;
        
        // ----- 自动射击系统 -----
        let autoShootTimer = 0;
        let baseShootDelay = 10;        // 基础发射间隔(帧)，约60帧 => 每秒6发，手感爽快
        let currentShootDelay = baseShootDelay;  // 受射速增益影响
        
        // ----- 增益系统 (道具效果) -----
        // 子弹类型: 'single', 'double', 'triple'
        let bulletType = 'single';      
        // 移动速度增益 (临时改变玩家速度)
        let originalPlayerSpeed = 5.6;
        let currentPlayerSpeed = originalPlayerSpeed;
        // 增益计时器 (帧数剩余)
        let powerupTimers = {
            double_triple: 0,    // 子弹形态剩余时间 (双/三)
            fireRate: 0,         // 射速加快剩余时间
            speedBoost: 0        // 移动加速剩余
        };
        // 射速增益时存储原始延迟，以便恢复
        let originalShootDelay = baseShootDelay;
        
        // 道具类型枚举
        const POWERUP_TYPE = {
            DOUBLE: 'double',     // 双发子弹
            TRIPLE: 'triple',     // 三发散弹
            RAPID: 'rapid',       // 射速提升（冷却减少）
            SPEED: 'speed'        // 移动速度提升
        };
        
        // 敌人生成控制
        let enemySpawnTimer = 0;
        
        // 移动标志 (键盘+触摸都用，保留键盘支持但为了移动端优先)
        const keys = {
            ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false,
            KeyW: false, KeyS: false, KeyA: false, KeyD: false
        };
        
        // ---------- 辅助函数 ----------
        function loadHighScore() {
            try {
                const saved = localStorage.getItem("planeWarHighScore");
                if(saved && !isNaN(parseInt(saved))) highScore = parseInt(saved);
                else highScore = 0;
            } catch(e) { highScore = 0; }
            updateScoreUI();
        }
        
        function saveHighScore() {
            if(currentScore > highScore) {
                highScore = currentScore;
                localStorage.setItem("planeWarHighScore", highScore);
                updateScoreUI();
            }
        }
        
        function updateScoreUI() {
            document.getElementById('scoreDisplay').innerText = currentScore;
            document.getElementById('bestDisplay').innerText = highScore;
        }
        
        function addScore(points) {
            currentScore += points;
            if(currentScore > highScore) {
                highScore = currentScore;
                localStorage.setItem("planeWarHighScore", highScore);
            }
            updateScoreUI();
        }
        
        // 更新增益显示文本
        function updateBuffStatusUI() {
            let statusMsg = "";
            if(powerupTimers.double_triple > 0) {
                if(bulletType === 'double') statusMsg = "🔫 双发子弹 · ";
                else if(bulletType === 'triple') statusMsg = "💥 三发散弹 · ";
            }
            if(powerupTimers.fireRate > 0) statusMsg += "⚡ 超速射击 · ";
            if(powerupTimers.speedBoost > 0) statusMsg += "💨 机动加速 · ";
            if(statusMsg === "") statusMsg = "⭐ 常规模式";
            const seconds = (powerupTimers.double_triple > 0 || powerupTimers.fireRate > 0 || powerupTimers.speedBoost > 0) ? 
                ` (${Math.max(powerupTimers.double_triple, powerupTimers.fireRate, powerupTimers.speedBoost)/60|0}s)` : "";
            document.getElementById('buffStatusText').innerHTML = statusMsg + seconds;
        }
        
        // ---------- 重置所有增益 & 恢复默认值 ----------
        function resetAllPowerups() {
            bulletType = 'single';
            powerupTimers.double_triple = 0;
            powerupTimers.fireRate = 0;
            powerupTimers.speedBoost = 0;
            currentShootDelay = baseShootDelay;
            currentPlayerSpeed = originalPlayerSpeed;
            updateBuffStatusUI();
        }
        
        // 应用道具效果
        function applyPowerup(type) {
            switch(type) {
                case POWERUP_TYPE.DOUBLE:
                    bulletType = 'double';
                    powerupTimers.double_triple = 420;  // 7秒 (60帧*7)
                    break;
                case POWERUP_TYPE.TRIPLE:
                    bulletType = 'triple';
                    powerupTimers.double_triple = 480;  // 8秒 更爽
                    break;
                case POWERUP_TYPE.RAPID:
                    // 射速提升: 缩短发射间隔到 5帧 (极速)
                    if(powerupTimers.fireRate <= 0) {
                        originalShootDelay = currentShootDelay;
                        currentShootDelay = 5;
                    }
                    powerupTimers.fireRate = 420;  // 7秒
                    break;
                case POWERUP_TYPE.SPEED:
                    if(powerupTimers.speedBoost <= 0) {
                        currentPlayerSpeed = 9.2;   // 移动速度大幅提升
                    }
                    powerupTimers.speedBoost = 360;  // 6秒
                    break;
                default: return;
            }
            updateBuffStatusUI();
        }
        
        // 更新增益计时器 (每帧)
        function updatePowerupTimers() {
            let changed = false;
            if(powerupTimers.double_triple > 0) {
                powerupTimers.double_triple--;
                if(powerupTimers.double_triple <= 0) {
                    bulletType = 'single';
                    changed = true;
                }
            }
            if(powerupTimers.fireRate > 0) {
                powerupTimers.fireRate--;
                if(powerupTimers.fireRate <= 0) {
                    // 恢复原始射速延迟
                    currentShootDelay = baseShootDelay;
                    changed = true;
                }
            }
            if(powerupTimers.speedBoost > 0) {
                powerupTimers.speedBoost--;
                if(powerupTimers.speedBoost <= 0) {
                    currentPlayerSpeed = originalPlayerSpeed;
                    changed = true;
                }
            }
            if(changed) updateBuffStatusUI();
        }
        
        // ---------- 自动射击 (根据当前子弹类型生成多枚子弹) ----------
        function performShoot() {
            const px = player.x;
            const py = player.y - 10;
            if(bulletType === 'single') {
                bullets.push({ x: px, y: py, radius: 5, speedY: -8.2 });
            } 
            else if(bulletType === 'double') {
                bullets.push({ x: px - 11, y: py, radius: 5, speedY: -8.2 });
                bullets.push({ x: px + 11, y: py, radius: 5, speedY: -8.2 });
            }
            else if(bulletType === 'triple') {
                bullets.push({ x: px, y: py, radius: 5, speedY: -8.5 });
                bullets.push({ x: px - 12, y: py - 2, radius: 5, speedY: -8.5 });
                bullets.push({ x: px + 12, y: py - 2, radius: 5, speedY: -8.5 });
            }
        }
        
        // 生成掉落道具 (敌机死亡时调用)
        function dropPowerup(x, y) {
            // 20% 概率掉落道具，让游戏更有期待
            if(Math.random() > 0.22) return;
            const types = [POWERUP_TYPE.DOUBLE, POWERUP_TYPE.TRIPLE, POWERUP_TYPE.RAPID, POWERUP_TYPE.SPEED];
            const randType = types[Math.floor(Math.random() * types.length)];
            powerups.push({
                x: x, y: y, radius: 12, 
                type: randType, 
                speedY: 2.2
            });
        }
        
        // 生成敌机
        function spawnEnemy() {
            const radius = 14;
            const x = Math.random() * (W - 2 * radius) + radius;
            const y = -radius - Math.random() * 30;
            let speed = 2.8 + Math.min(2.6, currentScore / 280);
            enemies.push({ x, y, radius, speedY: speed });
        }
        
        // ---------- 更新游戏逻辑 ----------
        function updateGame() {
            if(gameState !== "playing") return;
            
            // 1. 玩家移动 (键盘 + 鼠标/触摸已经独立修改player坐标，但键盘也需要)
            let moveX = 0, moveY = 0;
            if(keys.ArrowLeft || keys.KeyA) moveX = -1;
            if(keys.ArrowRight || keys.KeyD) moveX = 1;
            if(keys.ArrowUp || keys.KeyW) moveY = -1;
            if(keys.ArrowDown || keys.KeyS) moveY = 1;
            if(moveX !== 0 || moveY !== 0) {
                const len = Math.hypot(moveX, moveY);
                moveX /= len;
                moveY /= len;
                player.x += moveX * currentPlayerSpeed;
                player.y += moveY * currentPlayerSpeed;
            }
            // 边界限制
            player.x = Math.min(Math.max(player.x, BASE_PLAYER_RADIUS), W - BASE_PLAYER_RADIUS);
            player.y = Math.min(Math.max(player.y, BASE_PLAYER_RADIUS + 12), H - BASE_PLAYER_RADIUS - 8);
            
            // 2. 自动射击计时器
            if(autoShootTimer <= 0) {
                performShoot();
                autoShootTimer = currentShootDelay;
            } else {
                autoShootTimer--;
            }
            
            // 3. 子弹移动 + 边界清除
            for(let i=0; i<bullets.length; i++) {
                bullets[i].y += bullets[i].speedY;
                if(bullets[i].y + bullets[i].radius < 0 || bullets[i].y - bullets[i].radius > H) {
                    bullets.splice(i,1);
                    i--;
                }
            }
            
            // 4. 敌机移动
            for(let i=0; i<enemies.length; i++) {
                enemies[i].y += enemies[i].speedY;
                if(enemies[i].y + enemies[i].radius < -80 || enemies[i].y - enemies[i].radius > H+120) {
                    enemies.splice(i,1);
                    i--;
                }
            }
            
            // 5. 道具移动
            for(let i=0; i<powerups.length; i++) {
                powerups[i].y += powerups[i].speedY;
                if(powerups[i].y + powerups[i].radius > H + 50 || powerups[i].y + powerups[i].radius < -50) {
                    powerups.splice(i,1);
                    i--;
                }
            }
            
            // 6. 子弹 vs 敌机碰撞 (加分 + 概率掉道具)
            for(let i=bullets.length-1; i>=0; i--) {
                const bullet = bullets[i];
                let hit = false;
                for(let j=enemies.length-1; j>=0; j--) {
                    const enemy = enemies[j];
                    const dx = bullet.x - enemy.x;
                    const dy = bullet.y - enemy.y;
                    if(Math.hypot(dx, dy) < bullet.radius + enemy.radius) {
                        // 碰撞消灭敌机
                        bullets.splice(i,1);
                        const enemyX = enemy.x, enemyY = enemy.y;
                        enemies.splice(j,1);
                        addScore(10);
                        // 掉落道具
                        dropPowerup(enemyX, enemyY);
                        hit = true;
                        break;
                    }
                }
                if(hit) continue;
            }
            
            // 7. 玩家拾取道具
            for(let i=0; i<powerups.length; i++) {
                const p = powerups[i];
                const dx = player.x - p.x;
                const dy = player.y - p.y;
                if(Math.hypot(dx, dy) < BASE_PLAYER_RADIUS + p.radius) {
                    applyPowerup(p.type);
                    powerups.splice(i,1);
                    i--;
                }
            }
            
            // 8. 玩家与敌机碰撞 => game over
            for(let i=0; i<enemies.length; i++) {
                const enemy = enemies[i];
                if(Math.hypot(player.x - enemy.x, player.y - enemy.y) < BASE_PLAYER_RADIUS + enemy.radius) {
                    gameState = "gameover";
                    saveHighScore();
                    break;
                }
            }
            
            // 9. 动态生成敌机
            let dynamicSpawnDelay = Math.max(18, 32 - Math.floor(currentScore / 150));
            if(enemySpawnTimer <= 0) {
                spawnEnemy();
                // 高分段偶尔双倍压力
                if(currentScore > 500 && Math.random() < 0.2) spawnEnemy();
                enemySpawnTimer = dynamicSpawnDelay;
            } else {
                enemySpawnTimer--;
            }
            
            // 10. 更新增益计时器
            updatePowerupTimers();
        }
        
        // ---------- 绘图模块 ----------
        function drawStars() {
            for(let s of stars) {
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.size, 0, Math.PI*2);
                ctx.fillStyle = `rgba(255, 240, 210, ${s.brightness})`;
                ctx.fill();
                s.y += s.speed;
                if(s.y > H + 8) {
                    s.y = -5;
                    s.x = Math.random() * W;
                }
            }
        }
        
        // 华丽战机
        function drawPlayer() {
            ctx.save();
            ctx.shadowBlur = 12;
            ctx.shadowColor = "#2ad4ff";
            const px = player.x, py = player.y;
            ctx.beginPath();
            ctx.moveTo(px, py - 20);
            ctx.lineTo(px - 15, py + 5);
            ctx.lineTo(px - 6, py + 2);
            ctx.lineTo(px - 6, py + 12);
            ctx.lineTo(px, py + 8);
            ctx.lineTo(px + 6, py + 12);
            ctx.lineTo(px + 6, py + 2);
            ctx.lineTo(px + 15, py + 5);
            ctx.closePath();
            const grad = ctx.createLinearGradient(px-8, py-4, px+8, py+8);
            grad.addColorStop(0, '#8ad4ff');
            grad.addColorStop(1, '#2a6eff');
            ctx.fillStyle = grad;
            ctx.fill();
            ctx.strokeStyle = '#c0faff';
            ctx.lineWidth = 1.5;
            ctx.stroke();
            // 引擎光效
            ctx.beginPath();
            ctx.arc(px, py+5, 7, 0, Math.PI*2);
            ctx.fillStyle = '#ffaa44';
            ctx.shadowColor = "#ff7700";
            ctx.fill();
            ctx.beginPath();
            ctx.arc(px, py+2, 3.5, 0, Math.PI*2);
            ctx.fillStyle = 'white';
            ctx.fill();
            // 双翼
            ctx.beginPath();
            ctx.moveTo(px-15, py+5);
            ctx.lineTo(px-22, py+12);
            ctx.lineTo(px-13, py+9);
            ctx.fillStyle = '#3e8ed0';
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(px+15, py+5);
            ctx.lineTo(px+22, py+12);
            ctx.lineTo(px+13, py+9);
            ctx.fill();
            ctx.restore();
        }
        
        function drawEnemy(e) {
            ctx.save();
            ctx.shadowBlur = 5;
            ctx.shadowColor = "#ff3a3a";
            ctx.beginPath();
            ctx.arc(e.x, e.y, e.radius-1, 0, Math.PI*2);
            const grad = ctx.createRadialGradient(e.x-3, e.y-3, 3, e.x, e.y, e.radius);
            grad.addColorStop(0, '#e65c5c');
            grad.addColorStop(1, '#9b2222');
            ctx.fillStyle = grad;
            ctx.fill();
            ctx.beginPath();
            ctx.arc(e.x, e.y, e.radius-3, 0, Math.PI*2);
            ctx.fillStyle = '#b12a2a';
            ctx.fill();
            ctx.fillStyle = "#fff7e0";
            ctx.beginPath();
            ctx.arc(e.x-5, e.y-3, 2.5, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(e.x+5, e.y-3, 2.5, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = "#020202";
            ctx.beginPath();
            ctx.arc(e.x-5.5, e.y-4, 1.2, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(e.x+4.5, e.y-4, 1.2, 0, Math.PI*2);
            ctx.fill();
            ctx.restore();
        }
        
        function drawBullet(b) {
            ctx.save();
            ctx.shadowBlur = 7;
            ctx.shadowColor = "#ffdd77";
            ctx.beginPath();
            ctx.rect(b.x-3, b.y-7, 6, 12);
            ctx.fillStyle = '#ffdf7e';
            ctx.fill();
            ctx.beginPath();
            ctx.rect(b.x-1.2, b.y-10, 2.4, 14);
            ctx.fillStyle = '#ffaa33';
            ctx.fill();
            ctx.restore();
        }
        
        function drawPowerup(p) {
            ctx.save();
            ctx.shadowBlur = 8;
            ctx.shadowColor = "#ffbb66";
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.radius-2, 0, Math.PI*2);
            let color = "#ffcc44";
            if(p.type === POWERUP_TYPE.DOUBLE) color = "#44ddff";
            if(p.type === POWERUP_TYPE.TRIPLE) color = "#ff66cc";
            if(p.type === POWERUP_TYPE.RAPID) color = "#ff4444";
            if(p.type === POWERUP_TYPE.SPEED) color = "#88ff88";
            ctx.fillStyle = color;
            ctx.fill();
            ctx.fillStyle = "white";
            ctx.font = `bold ${p.radius+4}px monospace`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            let icon = "?";
            if(p.type === POWERUP_TYPE.DOUBLE) icon = "✧";
            if(p.type === POWERUP_TYPE.TRIPLE) icon = "★";
            if(p.type === POWERUP_TYPE.RAPID) icon = "⚡";
            if(p.type === POWERUP_TYPE.SPEED) icon = "➤";
            ctx.fillText(icon, p.x, p.y+1);
            ctx.restore();
        }
        
        function drawBackground() {
            const grad = ctx.createLinearGradient(0, 0, 0, H);
            grad.addColorStop(0, '#020617');
            grad.addColorStop(0.7, '#0a1022');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, W, H);
            for(let i=0;i<4;i++) {
                ctx.fillStyle = 'rgba(30, 70, 120, 0.15)';
                ctx.fillRect(0, H*0.6 + i*40, W, 25);
            }
        }
        
        function drawGameOverlay() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.82)";
            ctx.fillRect(0, 0, W, H);
            ctx.font = "bold 46 'Segoe UI'";
            ctx.fillStyle = "#ffbc6e";
            ctx.shadowBlur = 0;
            ctx.textAlign = "center";
            ctx.fillText("💥 战机坠毁", W/2, H/2 - 50);
            ctx.font = "24px monospace";
            ctx.fillStyle = "#ddf4ff";
            ctx.fillText("点击「重生」或按 R 键", W/2, H/2 + 35);
            ctx.font = "22px monospace";
            ctx.fillStyle = "#ffcc88";
            ctx.fillText("本次得分: " + currentScore + "   最高记录: " + highScore, W/2, H/2 + 100);
            ctx.textAlign = "left";
        }
        
        function drawHUD() {
            // 显示当前射速增益倒计时圈圈（小点缀）
            if(powerupTimers.fireRate > 0) {
                ctx.font = "bold 15px monospace";
                ctx.fillStyle = "#ffaa66";
                ctx.shadowBlur = 0;
                ctx.fillText("⚡超速射击", 20, 45);
            }
            if(powerupTimers.speedBoost > 0) {
                ctx.fillStyle = "#88ffaa";
                ctx.fillText("💨 极速机动", 20, 75);
            }
        }
        
        function render() {
            drawBackground();
            drawStars();
            for(let b of bullets) drawBullet(b);
            for(let e of enemies) drawEnemy(e);
            for(let p of powerups) drawPowerup(p);
            drawPlayer();
            drawHUD();
            if(gameState === "gameover") drawGameOverlay();
        }
        
        // ---------- 初始化星空 ----------
        function initStars() {
            stars = [];
            for(let i=0;i<200;i++) {
                stars.push({
                    x: Math.random() * W,
                    y: Math.random() * H,
                    size: Math.random() * 2.5 + 1,
                    speed: Math.random() * 1.2 + 0.5,
                    brightness: Math.random() * 0.6 + 0.3
                });
            }
        }
        
        // ---------- 重置游戏 ----------
        function restartGame() {
            gameState = "playing";
            player.x = W/2;
            player.y = H - 65;
            bullets = [];
            enemies = [];
            powerups = [];
            currentScore = 0;
            updateScoreUI();
            autoShootTimer = 3;
            enemySpawnTimer = 6;
            resetAllPowerups();
            currentShootDelay = baseShootDelay;
            currentPlayerSpeed = originalPlayerSpeed;
            updateBuffStatusUI();
        }
        
        // ---------- 触摸 & 鼠标移动 (手机跟随核心) ----------
        function handleTouchMove(e) {
            if(gameState !== "playing") return;
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let touch = e.touches[0];
            let touchX = (touch.clientX - rect.left) * scaleX;
            let touchY = (touch.clientY - rect.top) * scaleY;
            touchX = Math.min(Math.max(touchX, BASE_PLAYER_RADIUS), W - BASE_PLAYER_RADIUS);
            touchY = Math.min(Math.max(touchY, BASE_PLAYER_RADIUS+10), H - BASE_PLAYER_RADIUS-8);
            player.x = touchX;
            player.y = touchY;
        }
        
        function handleMouseMove(e) {
            if(gameState !== "playing") return;
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let mouseX = (e.clientX - rect.left) * scaleX;
            let mouseY = (e.clientY - rect.top) * scaleY;
            mouseX = Math.min(Math.max(mouseX, BASE_PLAYER_RADIUS), W - BASE_PLAYER_RADIUS);
            mouseY = Math.min(Math.max(mouseY, BASE_PLAYER_RADIUS+10), H - BASE_PLAYER_RADIUS-8);
            player.x = mouseX;
            player.y = mouseY;
        }
        
        // 键盘支持 + R键重启
        function handleKeyDown(e) {
            let code = e.code;
            if(keys.hasOwnProperty(code)) {
                keys[code] = true;
                e.preventDefault();
            }
            if(code === 'KeyR') {
                e.preventDefault();
                restartGame();
            }
            // 手机物理键盘不用管射击，完全自动
        }
        
        function handleKeyUp(e) {
            let code = e.code;
            if(keys.hasOwnProperty(code)) keys[code] = false;
        }
        
        // 事件绑定
        canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
        canvas.addEventListener('touchstart', (e) => e.preventDefault());
        canvas.addEventListener('mousemove', handleMouseMove);
        window.addEventListener('keydown', handleKeyDown);
        window.addEventListener('keyup', handleKeyUp);
        document.getElementById('restartButton').addEventListener('click', () => restartGame());
        canvas.addEventListener('contextmenu', (e) => e.preventDefault());
        
        // 初始化
        loadHighScore();
        initStars();
        restartGame();
        
        // 启动游戏循环
        function gameLoop() {
            updateGame();
            render();
            requestAnimationFrame(gameLoop);
        }
        gameLoop();
    })();
</script>
</body>
</html>
