<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>示例工具：加法计算器</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Microsoft YaHei", sans-serif;
      max-width: 720px;
      margin: 0 auto;
      padding: 24px 16px;
      line-height: 1.6;
    }
    .box {
      border: 1px solid #d0d7de;
      border-radius: 14px;
      padding: 16px;
      background: #fff;
      box-shadow: 0 6px 18px rgba(31,35,40,.06);
    }
    input {
      padding: 10px 12px;
      margin-right: 8px;
      margin-bottom: 8px;
      border-radius: 10px;
      border: 1px solid #d0d7de;
      font-size: 15px;
    }
    button {
      padding: 10px 14px;
      border: 0;
      border-radius: 10px;
      background: #0969da;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }
    a { color: #0969da; }
  </style>
</head>
<body>
  <p><a href="../index.html">← 返回工具箱索引页</a></p>
  <h1>示例工具：加法计算器</h1>
  <div class="box">
    <p>这个页面只是演示目录结构和 JSON 自动读取方式。</p>
    <input id="a" type="number" value="1" />
    <input id="b" type="number" value="2" />
    <button id="calcBtn">计算</button>
    <p id="result">结果：3</p>
  </div>

  <script>
    const a = document.getElementById('a');
    const b = document.getElementById('b');
    const result = document.getElementById('result');
    document.getElementById('calcBtn').addEventListener('click', () => {
      const sum = Number(a.value || 0) + Number(b.value || 0);
      result.textContent = '结果：' + sum;
    });
  </script>
</body>
</html>
